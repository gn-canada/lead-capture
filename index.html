<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Capture</title>
<style>
:root {
  --primary:#111;
  --accent:#2563eb;
  --bg:#f9fafb;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#111827;
  --sub:#6b7280;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:var(--bg);
  color:var(--text);
}
.container{
  max-width:600px;
  margin:0px auto;
  padding:0px;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}
h1{font-size:22px;margin-bottom:5px}
.subtitle{font-size:14px;color:var(--sub);margin-bottom:20px}
.section{margin-top:20px}
.label{font-size:12px;text-transform:uppercase;color:var(--sub);margin-bottom:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.full{grid-template-columns:1fr}
input,select,textarea{
  padding:12px;margin: 2px; border:1px solid var(--border);
  border-radius:10px;font-size:14px;width:100%
}
input:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(37,99,235,0.15)
}
textarea{min-height:80px;resize:none}
.tags{display:flex;flex-wrap:wrap;gap:8px}
.tag{padding:6px 12px;border-radius:999px;border:1px solid var(--border);cursor:pointer;font-size:13px}
.tag.active{background:var(--accent);color:white;border-color:var(--accent)}
.stars{display:flex;gap:6px;font-size:22px;cursor:pointer}
.star.active{color:#f59e0b}
.stars span {
  font-size: 22px;
  cursor: pointer;
  color: #6b7280; /* gray default */
  transition: color 0.2s;
}

.stars span.active {
  color: #f59e0b; /* gold */
}
.header-center {
  display: flex;
  justify-content: center;
  margin-bottom: 0.2rem; /* space below logo */
}

.header-center .logo {
  max-height: 180px; /* bigger */
  width: auto;       /* maintain aspect ratio */
  object-fit: contain;
}

.wholesalers-group {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 1.5rem;
}

.wholesalers-group label {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 14px;
  padding: 6px 12px;
  border-radius: 20px; /* pill-shaped */
  cursor: pointer;
  border: 1px solid #ccc;
}

@media (max-width: 600px) {

  .wholesalers-group {
    display: flex;
    flex-direction: column;   /* stack neatly */
    gap: 10px;
  }

  .wholesalers-group label {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 12px 14px;
    font-size: 15px;
    border-radius: 16px;
    box-sizing: border-box;
    overflow: hidden;         /* prevents text from spilling out */
    white-space: nowrap;      /* keeps text inside the pill */
  }

  .wholesalers-group label input[type=checkbox] {
    flex-shrink: 0;           /* checkbox stays fixed size */
    margin: 0;
  }

  .wholesaler-others {
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
  }

  .wholesaler-others input[type=text] {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    border-radius: 14px;
  }
}



.wholesalers-group input[type=text] {
  margin-left: 5px;
  padding: 4px 6px;
  font-size: 13px;
  border-radius: 12px; /* rounded like pill */
  border: 1px solid #ccc;
  max-width: 150px;
}

.wholesaler-others input[type=text] {
  flex-shrink: 0;
}
.browse-btn-wrapper {
  display: flex;
  justify-content: center;
  margin-bottom: 2rem;
}

.browse-btn {
  max-width: 250px;
  padding: 12px 18px;
  font-size: 16px;
}
.header h2 {
  font-size: 24px;
  font-weight: 600;
}

.logo {
  max-height: 50px;
  object-fit: contain;
}
button{
  margin-top:20px;width:100%;padding:14px;border:none;
  border-radius:12px;background:var(--primary);
  color:white;font-size:15px;cursor:pointer
}
button:hover{opacity:0.9}
.success{display:none;text-align:center;padding:40px}

@media (max-width: 600px) {
  .header-center .logo {
    max-height: 120px; /* smaller on mobile */
  }
}
</style>
</head>
<div class="header-center">
  <img src="GN_Canada_Logo.png" alt="Company Logo" class="logo">
</div>
<body>
<div class="container">

<div class="card" id="form">
<h1>Lead Capture</h1>
<p class="subtitle">Quickly save customer details</p>
<div class="browse-btn-wrapper">
  <a href="https://heyzine.com/flip-book/1cdadaf5bd.html#page/1" target="_blank">
    <button class="submit-btn browse-btn">Browse the 2026 Portfolio</button>
  </a>
</div>
<div class="section">
<div class="label">Contact</div>
<div class="grid">
<input id="first" placeholder="First name">
<input id="last" placeholder="Last name">
</div>
<div class="grid">
<input id="company" placeholder="Company / Store">
<input id="title" placeholder="Title">
</div>
<div class="grid">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
</div>
</div>

<div class="section">
<div class="label">Business Info</div>
<div class="grid">
<select id="retailerType">
<option value="">Retailer Type</option>
<option>Convenience</option>
<option>Gas station</option>
<option>Grocery</option>
<option>Pharmacy</option>
<option>Tobacco / vape shop</option>
<option>Other</option>
</select>
<select id="locations">
<option value=""># Locations</option>
<option>1</option>
<option>2–5</option>
<option>6–20</option>
<option>21–50</option>
<option>50+</option>
</select>
</div>
<div class="grid">
<select id="province">
<option value="">Province</option>
<option>AB</option><option>BC</option><option>MB</option>
<option>NB</option><option>NL</option><option>NS</option>
<option>ON</option><option>PE</option><option>QC</option><option>SK</option>
</select>
<select id="timeline">
<option value="">Purchase Timeline</option>
<option>Ready now</option>
<option>1–3 months</option>
<option>3–6 months</option>
<option>Browsing</option>
</select>
</div>
</div>

<div class="section">
<div class="label">Interests</div>
<div class="tags" id="tags">
<div class="tag" onclick="toggle(this)">Vaping</div>
<div class="tag" onclick="toggle(this)">Tobacco</div>
<div class="tag" onclick="toggle(this)">Pouches</div>
<div class="tag" onclick="toggle(this)">Accessories</div>
<div class="tag" onclick="toggle(this)">New brands</div>
<div class="tag" onclick="toggle(this)">Pricing</div>
<div class="tag" onclick="toggle(this)">Samples</div>
<div class="tag" onclick="toggle(this)">Expanding Stores</div>
</div>
</div>

<div class="section">
<div class="label">Which wholesalers do you work with?</div>
<div class="wholesalers-group" id="wholesalers">
  <label><input type="checkbox" value="CFS"> CFS</label>
  <label><input type="checkbox" value="TRA"> TRA</label>
  <label><input type="checkbox" value="CoreMark"> CoreMark</label>
  <label class="wholesaler-others">
    <input type="checkbox" value="Others" id="wholesaler-others-checkbox"> Others
    <input type="text" id="wholesaler-other" placeholder="Specify other">
  </label>
</div>
</div>
<div class="section">
<div class="label">Lead Rating</div>
<div class="stars" id="stars">
<span onclick="rate(1)">★</span>
<span onclick="rate(2)">★</span>
<span onclick="rate(3)">★</span>
<span onclick="rate(4)">★</span>
<span onclick="rate(5)">★</span>
</div>
</div>

<div class="section">
<div class="label">Follow-up</div>
<div class="grid full">
<select id="followup">
<option value="">Next Step</option>
<option>Send samples</option>
<option>Send pricing</option>
<option>Schedule call</option>
<option>Newsletter</option>
<option>No follow-up</option>
</select>
</div>
</div>

<div class="section">
<div class="label">Notes</div>
<div class="grid full">
<textarea id="notes" placeholder="Notes..."></textarea>
</div>
</div>

<button onclick="submitForm()">Save Lead</button>
</div>

<div class="card success" id="success">
<h2>✅ Lead Saved</h2>
<p id="name"></p>
<button onclick="reset()">New Lead</button>
</div>

</div>

<script>
let rating=0;
function toggle(el){el.classList.toggle('active')}
function rate(n){
  rating=n;
  document.querySelectorAll('#stars span').forEach((s,i)=>{
    s.classList.toggle('active',i<n)
  })
}

function submitForm() {
  // Interests
  const interests = [...document.querySelectorAll('.tag.active')].map(t => t.textContent).join(', ');

  // Wholesalers
  const wholesalerEls = document.querySelectorAll('#wholesalers input[type=checkbox]');
  let wholesalers = [];
  wholesalerEls.forEach(el => {
    if (el.checked) {
      if (el.value === "Others") {
        const other = document.getElementById('wholesaler-other').value.trim();
        if (other) wholesalers.push(other);
      } else {
        wholesalers.push(el.value);
      }
    }
  });

  // Lead object
  const lead = {
    name: document.getElementById('first').value + " " + document.getElementById('last').value,
    company: document.getElementById('company').value,
    title: document.getElementById('title').value,
    email: document.getElementById('email').value,
    phone: document.getElementById('phone').value,
    retailerType: document.getElementById('retailerType').value,
    locations: document.getElementById('locations').value,
    province: document.getElementById('province').value,
    timeline: document.getElementById('timeline').value,
    interests,
     wholesalers: wholesalers.join(', '),
    rating,
    followup: document.getElementById('followup').value,
    notes: document.getElementById('notes').value
  };

  // Build URL with ? before params
  const params = new URLSearchParams(lead).toString();
  const url = "https://script.google.com/macros/s/AKfycbzrsje9rwFrcrO7Clgax3E0dwZeJEjNADdayy9mWMs5I-CqNTEloCpzI1drT7quoy06Cw/exec?" + params;

  fetch(url)
    .then(res => res.text())
    .then(data => console.log("Success:", data))
    .catch(err => console.error("Error:", err));

  // Show success view
  document.getElementById('form').style.display = 'none';
  document.getElementById('success').style.display = 'block';
  document.getElementById('name').innerText = lead.name || lead.company;
}


function reset(){location.reload()}
</script>
</body>
</html>
